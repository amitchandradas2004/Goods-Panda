<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goods Panda</title>
    <!-- Google Fonts 1 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Google Fonts 2 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- daisy  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <style>
    .poppins {
      font-family: "Poppins", sans-serif;
      font-style: normal;
    }
    .inter {
      font-family: "Inter", sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
    }
  </style>
  <body class="bg-linear-to-l from-violet-200 to-fuchsia-200">
    <header class="bg-violet-200">
      <nav
        class="flex justify-between items-center container mx-auto px-2 md:px-0"
      >
        <div>
          <div class="drawer">
            <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
            <div class="drawer-content flex flex-col">
              <!-- Navbar -->
              <div class="navbar w-full">
                <div class="flex-none lg:hidden">
                  <label
                    for="my-drawer-2"
                    aria-label="open sidebar"
                    class="btn btn-square btn-ghost"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                      class="inline-block h-6 w-6 stroke-current"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M4 6h16M4 12h16M4 18h16"
                      ></path>
                    </svg>
                  </label>
                </div>
              </div>
            </div>
            <div class="drawer-side">
              <label
                for="my-drawer-2"
                aria-label="close sidebar"
                class="drawer-overlay"
              ></label>
              <ul
                class="menu bg-violet-100 min-h-70 mt-5 w-50 p-4 rounded-r-2xl"
              >
                <!-- Sidebar content here -->
                <li class="font-semibold text-2xl">
                  <span class="border border-gray-400 btn mb-2 rounded-xl py-7"
                    ><a
                      href="https://www.mi.com/np/mi-led-tv-4a-pro-32/"
                      target="_blank"
                      >Explore Some Televisions</a
                    ></span
                  >
                </li>
                <li class="font-semibold text-2xl">
                  <span class="p-5 border border-gray-400 btn rounded-xl"
                    ><a
                      href="https://www.aarong.com/bgd/men/accessories "
                      target="_blank"
                      >Men's Accessories
                    </a></span
                  >
                </li>
              </ul>
            </div>
          </div>
        </div>
        <div>
          <img src="./assets/logo.png" alt="" class="w-20" />
        </div>
      </nav>
    </header>

    <!-- Main Section -->
    <main>
      <!-- Mi LED TV 4A PRO 32 Section -->
      <section class="container mx-auto my-10">
        <div
          class="flex flex-col-reverse md:flex-row justify-between bg-[#FEEAE9] py-8 px-5 rounded-2xl gap-5 mx-3 md:mx-0"
        >
          <div class="space-y-5 text-center md:text-start">
            <h2 class="poppins text-5xl font-bold">Mi LED TV 4A PRO 32</h2>
            <p class="inter">
              The Mi LED TV 4A PRO 32 (80cm) is an affordable, feature-rich
              <br />
              Android TV (Android 8.1 or higher) featuring a 1366x768 HD-ready
              display, PatchWall content integration, and 20W stereo speakers.
            </p>
            <p class="inter text-[#FF136F] text-2xl font-semibold">
              25,000 taka
            </p>
            <a
              href="https://www.startech.com.bd/mi-4a-l32m5-5asp-hd-led-smart-tv?srsltid=AfmBOoqa-KeCisMOI6TX9R_ZR6iY0AxybIN22EfXDqEsHO8yUcyvvOot"
              target="_blank"
            >
              <button class="btn btn-secondary">BUY NOW</button></a
            >
          </div>
          <div>
            <img src="./assets/hero-tv.png" alt="" class="mx-auto" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
